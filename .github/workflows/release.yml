name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest        # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'sticky ${{ github.ref_name }}'
          releaseBody: |
            ## Download

            ### macOS
            - **Apple Silicon (M1/M2/M3+)** — `sticky_*_aarch64.dmg`
            - **Intel** — `sticky_*_x64.dmg`

            ### Windows
            - `sticky_*_x64-setup.exe`

            ### Linux
            - **AppImage** (any distro) — `sticky_*_amd64.AppImage`
            - **Debian/Ubuntu** — `sticky_*_amd64.deb`

            > The `.tar.gz`, `.sig`, and `latest.json` files are for the in-app auto-updater. You don't need to download them.

            First launch on macOS: right-click the app → Open → Open. One-time Gatekeeper warning (app is unsigned).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --config '{"bundle":{"createUpdaterArtifacts":true}}'
          updaterJsonPreferNsis: false
